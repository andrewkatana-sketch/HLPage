# Homepage Settings

# Theme and Appearance
theme: dark
title: Home Dashboard

# Background Image (using external URL)
background: https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80

# Time & Location
timezone: America/New_York

# Weather - Uses IP-based location automatically
weather:
  provider: openmeteo

# Layout
layout:
  - Services:
      style: row
  - Media:
      style: row

# Header (top bar)
header:
  - search:
      provider: duckduckgo
      focus: true
  - datetime:
      format: "%I:%M %p"
      dateFormat: "%A, %B %d"
  - weather:
      location: local
      units: imperial
      show-icon: true
